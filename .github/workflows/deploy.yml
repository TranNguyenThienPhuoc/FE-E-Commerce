name: Deploy Frontend to Amazon ECS and S3

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: my-app-frontend
  ECS_SERVICE: frontend-service
  ECS_CLUSTER: my-app-cluster
  ECS_TASK_DEFINITION_FAMILY: my-app-frontend
  CONTAINER_NAME: frontend-container
  FE_S3_BUCKET: ${{ secrets.FE_STATIC_S3_BUCKET }}
  # CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} # Bỏ comment khi có CloudFront

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        npm install -g bun
        bun install
        
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        
        # Extract dist/client from the built image to guarantee hash match
        docker create --name extract $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker cp extract:/usr/src/app/dist/client ./dist-client
        docker rm extract
        
        # Sync the exact assets generated by Docker to S3
        aws s3 sync ./dist-client s3://${{ env.FE_S3_BUCKET }}/ --delete
        
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download current ECS task definition
      run: |
        aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION_FAMILY }} --query taskDefinition > task-def.json
        jq 'del(.enableFaultInjection) | .cpu="256" | .memory="400" | .containerDefinitions[0].cpu=256 | .containerDefinitions[0].memory=400' task-def.json > tmp.json && mv tmp.json task-def.json

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-def.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
